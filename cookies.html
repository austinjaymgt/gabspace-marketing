  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1A1A2E;
      --ink2: #3D3D5C;
      --ink3: #8585A0;
      --cream: #F7F5F0;
      --white: #FFFFFF;
      --sage: #6B8F71;
      --violet: #7C5CBF;
      --violet-pale: #F0EBF9;
      --border: rgba(26,26,46,0.09);
      --border-soft: rgba(26,26,46,0.06);
      --radius: 12px;
      --radius-pill: 100px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; border-bottom: 0.5px solid var(--border-soft); background: var(--cream); position: sticky; top: 0; z-index: 100; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 34px; height: 34px; background: linear-gradient(135deg, var(--violet), var(--sage)); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark svg { width: 18px; height: 18px; }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 0.875rem; color: var(--ink3); transition: color 0.2s; }
    .nav-links a:hover { color: var(--ink); }
    .btn { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; border-radius: var(--radius-pill); padding: 0.6rem 1.35rem; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: var(--ink); color: var(--white); }
    .btn-primary:hover { background: var(--ink2); transform: translateY(-1px); }

    .page { max-width: 820px; margin: 0 auto; padding: 4rem 2.5rem 3rem; }
    .page-eye { font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--violet); margin-bottom: 0.9rem; }
    .page-title { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 4.5vw, 3rem); font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 0.75rem; color: var(--ink); }
    .page-sub { font-size: 1rem; color: var(--ink3); font-weight: 300; line-height: 1.7; max-width: 620px; }
    .divider-thin { height: 0.5px; background: var(--border-soft); margin: 2.5rem 0; }
    .policy-frame { background: var(--white); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2.25rem 2.5rem; }

    footer { border-top: 0.5px solid var(--border-soft); padding: 1.75rem 2.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .foot-logo { display: flex; align-items: center; gap: 8px; }
    .foot-logo-mark { width: 22px; height: 22px; background: linear-gradient(135deg, var(--violet), var(--sage)); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .foot-logo-mark svg { width: 12px; height: 12px; }
    .foot-name { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
    .foot-links { display: flex; gap: 1.5rem; list-style: none; flex-wrap: wrap; }
    .foot-links a { font-size: 0.78rem; color: var(--ink3); transition: color 0.2s; }
    .foot-links a:hover { color: var(--ink); }
    .foot-copy { font-size: 0.72rem; color: var(--ink3); }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { display: none; }
      .page { padding: 2.5rem 1.25rem 2rem; }
      .policy-frame { padding: 1.5rem 1.25rem; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
